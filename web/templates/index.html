{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <h2 class="text-2xl font-bold text-gray-900">全部工具</h2>
    
    <div id="toolGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for tool in tools %}
        <a href="/tool/{{ tool.id }}" 
           class="tool-card group bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md transition-shadow"
           data-category="{{ tool.category }}">
            <div class="flex items-start space-x-4">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-100 to-purple-100 rounded-xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                    {{ tool.icon }}
                </div>
                <div class="flex-1">
                    <h3 class="font-semibold text-gray-900 group-hover:text-blue-600 transition-colors">
                        {{ tool.name }}
                    </h3>
                    <p class="text-sm text-gray-500 mt-1">
                        {{ tool.description }}
                    </p>
                    <div class="flex items-center mt-2 text-xs text-gray-400">
                        <iconify-icon icon="mdi:timer-outline" width="14" height="14" class="mr-1"></iconify-icon>
                        <span>已使用 {{ stats.tools[tool.id].uses }} 次</span>
                    </div>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
