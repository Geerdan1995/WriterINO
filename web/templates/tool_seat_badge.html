{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-6">
    <a href="/" class="inline-flex items-center text-blue-600 hover:text-blue-700">
        <iconify-icon icon="mdi:arrow-left" width="20" height="20" class="mr-1"></iconify-icon>
        返回首页
    </a>
    
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <div class="flex items-center space-x-4">
            <div class="w-16 h-16 bg-gradient-to-br from-yellow-100 to-orange-100 rounded-xl flex items-center justify-center text-3xl">
                {{ tool.icon }}
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-900">{{ tool.name }}</h1>
                <p class="text-gray-500">{{ tool.description }}</p>
            </div>
        </div>
    </div>
    
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 text-center">
        <p class="text-gray-500">功能开发中，敬请期待...</p>
    </div>
</div>
{% endblock %}
