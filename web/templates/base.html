<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汇帮忙 - 一个能帮上小忙的工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                    <span class="text-white text-xl font-bold">汇</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900">汇帮忙</h1>
                    <p class="text-sm text-gray-500">一个能帮上小忙的工具箱</p>
                </div>
            </div>
            
            <div class="flex-1 max-w-xl mx-8">
                <div class="relative">
                    <input type="text" id="searchInput" 
                           placeholder="搜索工具..." 
                           class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-full focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <div class="absolute left-3 top-2.5 text-gray-400">
                        <iconify-icon icon="mdi:magnify" width="20" height="20"></iconify-icon>
                    </div>
                </div>
            </div>
            
            <div class="text-right">
                <p class="text-sm text-gray-600">
                    汇帮忙工具已累计帮助 
                    <span class="font-bold text-blue-600" id="totalHelps">0</span> 人次
                </p>
                <p class="text-xs text-gray-500">
                    节省 <span class="font-bold" id="totalMinutes">0</span> 分钟
                </p>
            </div>
        </div>
    </header>
    
    <div class="flex max-w-7xl mx-auto">
        <aside class="w-64 bg-white shadow-sm min-h-screen border-r border-gray-200 p-4">
            <nav id="categoryNav" class="space-y-1">
            </nav>
        </aside>
        
        <main id="mainContent" class="flex-1 p-6">
        </main>
    </div>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
