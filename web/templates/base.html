<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汇帮忙 - 一个能帮上小忙的工具箱</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <style>
        :root {
            --primary-100: #EEF2FF;
            --primary-200: #C7D2FE;
            --primary-300: #A5B4FC;
            --primary-400: #818CF8;
            --primary-500: #6366F1;
            --primary-600: #4F46E5;
            --primary-700: #4338CA;
            
            --accent-400: #22D3EE;
            --accent-500: #06B6D4;
            --accent-600: #0891B2;
            
            --success-500: #10B981;
            --success-600: #059669;
            
            --warning-500: #F59E0B;
            
            --danger-500: #EF4444;
            
            --bg-gradient-start: #F8FAFF;
            --bg-gradient-mid: #F0F4FF;
            --bg-gradient-end: #EEF2FF;
            
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(99, 102, 241, 0.15);
            --glass-shadow: 0 8px 32px rgba(99, 102, 241, 0.1);
        }
        
        * {
            font-family: 'Noto Sans SC', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            min-h-screen: 100vh;
        }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, var(--primary-600) 0%, var(--accent-500) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-flex {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .gradient-btn {
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-600) 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .gradient-btn:hover {
            background: linear-gradient(135deg, var(--primary-600) 0%, var(--primary-700) 100%);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.35);
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .pulse-glow {
            animation: pulseGlow 3s ease-in-out infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
            50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.5); }
        }
        
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }
        .stagger-6 { animation-delay: 0.6s; }
        
        .shimmer-bg {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .upload-area {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .upload-area:hover,
        .upload-area.drag-over {
            border-color: var(--primary-400);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(6, 182, 212, 0.05) 100%);
        }
        
        .icon-wrapper {
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--accent-500) 100%);
        }
        
        .icon-wrapper-light {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(6, 182, 212, 0.1) 100%);
        }
        
        .tool-card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .tool-card-hover:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.2);
            border-color: var(--primary-300);
        }
        
        .category-btn-active {
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--accent-500) 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
        }

        .category-btn-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .progress-bar {
            background: linear-gradient(90deg, var(--primary-500) 0%, var(--accent-500) 100%);
        }
        
        .decorative-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            pointer-events: none;
            z-index: -1;
        }
        
        .blob-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--primary-300) 0%, var(--primary-500) 100%);
            top: -100px;
            right: -100px;
        }
        
        .blob-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--accent-300, #99F6E4) 0%, var(--accent-500) 100%);
            bottom: -50px;
            left: -50px;
        }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">
    
    <div class="decorative-blob blob-1"></div>
    <div class="decorative-blob blob-2"></div>
    
    <header class="glass-card sticky top-0 z-50 border-b-0">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 icon-wrapper rounded-2xl flex items-center justify-center floating pulse-glow">
                    <img src="/static/马.svg" alt="马" class="w-8 h-8">
                </div>
                <div>
                    <h1 class="text-2xl font-bold gradient-text">汇帮忙</h1>
                    <p class="text-sm text-gray-500 font-medium">一个能帮上小忙的工具箱</p>
                </div>
            </div>
            
            <div class="flex-1 max-w-2xl mx-10">
                <div class="relative">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                        <iconify-icon icon="mdi:magnify" width="22" height="22"></iconify-icon>
                    </div>
                    <input type="text" id="searchInput" 
                           placeholder="搜索工具..." 
                           class="w-full pl-14 pr-6 py-3.5 bg-white/60 backdrop-blur border border-gray-200/50 rounded-2xl focus:ring-2 focus:ring-primary-500/30 focus:border-primary-400 transition-all text-gray-700 placeholder-gray-400 font-medium shadow-sm">
                </div>
            </div>
            
            <div class="text-right">
                <div class="flex items-center space-x-4 bg-white/60 backdrop-blur border border-gray-200/50 rounded-2xl px-6 py-3.5 shadow-sm">
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 icon-wrapper-light rounded-lg flex items-center justify-center">
                            <iconify-icon icon="mdi:account-group" width="18" height="18" class="text-primary-500"></iconify-icon>
                        </div>
                        <span class="text-xl font-bold gradient-text" id="totalHelps">0</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 icon-wrapper-light rounded-lg flex items-center justify-center">
                            <iconify-icon icon="mdi:clock-outline" width="18" height="18" class="text-primary-500"></iconify-icon>
                        </div>
                        <span class="text-lg font-bold text-primary-600"><span id="totalMinutes">0</span> <span class="text-sm font-medium text-gray-500">min</span></span>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <div class="flex max-w-7xl mx-auto px-6 py-8 gap-8 min-h-[calc(100vh-140px)]">
        <aside class="w-48 shrink-0">
            <div class="glass-card rounded-3xl p-4 sticky top-28 h-full">
                <nav id="categoryNav" class="space-y-1">
                </nav>
            </div>
        </aside>
        
        <main id="mainContent" class="flex-1 min-w-0">
        </main>
    </div>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
